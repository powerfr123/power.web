<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>edito</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#111827;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

.field{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
    background:#1f2937;
    padding:12px;
    border-radius:10px;
}

.label{
    width:220px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:gray;
    color:black;
    padding:10px;
    border-radius:8px;
}

.value{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.lock-btn,
.copy-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}

.lock-btn{
    background:#374151;
    color:white;
}

.copy-btn{
    background:#2563eb;
    color:white;
}

</style>
</head>

<body>

<div class="container">

<h1 style="text-align:center;color:red;">DETAILS</h1>

<div class="field">

    <div class="label">
        First Name
        <button class="copy-btn">📋</button>
    </div>

    <input class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

<div class="field">

    <div class="label">
        Last Name
        <button class="copy-btn">📋</button>
    </div>

    <input class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

<div class="field">

    <div class="label">
        e-mail
        <button class="copy-btn">📋</button>
    </div>

    <input class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

<div class="field">

    <div class="label">
        Aadhaar No.
        <button class="copy-btn">📋</button>
    </div>

    <input class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

<div class="field">

    <div class="label">
        Mobile No.
        <button class="copy-btn">📋</button>
    </div>

    <input class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

</div>

<script>

function attachEvents(row){

    const lock = row.querySelector('.lock-btn');
    const value = row.querySelector('.value');
    const copy = row.querySelector('.copy-btn');

    let locked = false;

    lock.onclick = () => {

        locked = !locked;

        value.readOnly = locked;

        lock.textContent = locked ? '🔒' : '🔓';

        if(locked){
            value.style.background = '#ffe066';
            value.style.color = '#000';
        }
        else{
            value.style.background = '';
            value.style.color = '';
        }
    };

    copy.onclick = () => {

        navigator.clipboard.writeText(value.value);

        copy.textContent = '✓';

        setTimeout(() => {
            copy.textContent = '📋';
        }, 1000);
    };
}

document.querySelectorAll('.field').forEach(attachEvents);

</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuJlAKmegMxQTCHbpIFlUiKW5em1Z6l0w",
  authDomain: "edito-1910f.firebaseapp.com",
  projectId: "edito-1910f",
  storageBucket: "edito-1910f.firebasestorage.app",
  messagingSenderId: "310918134644",
  appId: "1:310918134644:web:a037498e2a46bf49904a21"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const userRef = doc(db, "users", "test");

async function loadData() {

    const snap = await getDoc(userRef);

    if (!snap.exists()) return;

    const data = snap.data();

    document.getElementById("firstName").value =
        data.firstName || "";

    document.getElementById("lastName").value =
        data.lastName || "";

    document.getElementById("email").value =
        data.email || "";

    document.getElementById("aadhaar").value =
        data.aadhaar || data.aadhar_No || "";

    document.getElementById("mobile").value =
        data.mobile || data.mobile_No || "";
}

async function saveData() {

    await updateDoc(userRef, {

        firstName:
            document.getElementById("firstName").value,

        lastName:
            document.getElementById("lastName").value,

        email:
            document.getElementById("email").value,

        aadhaar:
            document.getElementById("aadhaar").value,

        mobile:
            document.getElementById("mobile").value
    });
}

loadData();

document.querySelectorAll(".value")
.forEach(input => {

    input.addEventListener("change", saveData);

});

</script>

</body>
</html>
