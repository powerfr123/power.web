<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>edito</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#111827;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

.field{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
    background:#1f2937;
    padding:12px;
    border-radius:10px;
}

.label{
    width:220px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:gray;
    color:black;
    padding:10px;
    border-radius:8px;
}

.value{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.lock-btn,
.copy-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}

.lock-btn{
    background:#374151;
    color:white;
}

.copy-btn{
    background:#2563eb;
    color:white;
}

</style>
</head>

<body>

<div class="container">

<h1 style="text-align:center;color:red;">DETAILS</h1>

<div class="field">

    <div class="label">
        First Name
        <button class="copy-btn">📋</button>
    </div>

    <input class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

<div class="field">

    <div class="label">
        Last Name
        <button class="copy-btn">📋</button>
    </div>

    <input class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

<div class="field">

    <div class="label">
        e-mail(@gmail.com)
        <button class="copy-btn">📋</button>
    </div>

    <input class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

<div class="field">

    <div class="label">
        Aadhaar No.
        <button class="copy-btn">📋</button>
    </div>

    <input class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

<div class="field">

    <div class="label">
        Mobile No.
        <button class="copy-btn">📋</button>
    </div>

    <input class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

</div>

<script>

function attachEvents(row){

    const lock = row.querySelector('.lock-btn');
    const value = row.querySelector('.value');
    const copy = row.querySelector('.copy-btn');

    let locked = false;

    lock.onclick = () => {

        locked = !locked;

        value.readOnly = locked;

        lock.textContent = locked ? '🔒' : '🔓';

        if(locked){
            value.style.background = '#ffe066';
            value.style.color = '#000';
        }
        else{
            value.style.background = '';
            value.style.color = '';
        }
    };

    copy.onclick = () => {

        navigator.clipboard.writeText(value.value);

        copy.textContent = '✓';

        setTimeout(() => {
            copy.textContent = '📋';
        }, 1000);
    };
}

document.querySelectorAll('.field').forEach(attachEvents);

</script>

</body>
</html>
