<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/jpg" href="favicon.jpg" />

<title>editor</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
}

body{
    background:#111827;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    margin-bottom:20px;
}

.field{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
    background:#1f2937;
    padding:12px;
    border-radius:10px;
}

.label{
    width:220px;
    display:flex;
    align-items:center;
    justify-:space-between;
    background:gray;
    color:black;
    padding:10px;
    border-radius:8px;
}

.value{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

.lock-btn,
.copy-btn{
    width:40px;
    height:40px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:18px;
}

.lock-btn{
    background:#374151;
    color:white;
}

.copy-btn{
    background:#2563eb;
    color:white;
}

</style>
</head>

<body>

<body>

<div id="loginScreen" style="
max-width:400px;
margin:100px auto;
text-align:center;
">

<h2>Enter Password</h2>

<input
id="sitePassword"
type="password"
placeholder="Password"
style="
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
">

<button
id="unlockBtn"
style="
margin-top:10px;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
">
Unlock
</button>

</div>

<div class="container" id="mainContent" style="display:none;">

<h1 style="text-align:center;color:red;">DETAILS</h1>
<button id="logoutBtn" style="
padding:10px 15px;
background:#dc2626;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-bottom:15px;
text-align:right;
">
Logout
</button>
<button id="addUserBtn" style="
padding:12px 20px;
margin-bottom:15px;
border:none;
border-radius:8px;
background:#16a34a;
color:white;
font-size:16px;
cursor:pointer;
">
+ Add User
</button>
<select id="recordList" style="
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
font-size:16px;
">
</select>

<div class="field">

    <div class="label">
        First Name
        <button class="copy-btn">📋</button>
    </div>

    <input id="firstName" class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

<div class="field">

    <div class="label">
        Last Name
        <button class="copy-btn">📋</button>
    </div>

    <input id="lastName" class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

<div class="field">

    <div class="label">
        e-mail
        <button class="copy-btn">📋</button>
    </div>

    <input id="email" class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

<div class="field">

    <div class="label">
        Aadhaar No.
        <button class="copy-btn">📋</button>
    </div>

    <input id="aadhaar" class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

<div class="field">

    <div class="label">
        Mobile No.
        <button class="copy-btn">📋</button>
    </div>

    <input id="mobile" class="value" value="">

    <button class="lock-btn">🔓</button>

</div>

</div>

<script>

function attachEvents(row){

    const lock = row.querySelector('.lock-btn');
    const value = row.querySelector('.value');
    const copy = row.querySelector('.copy-btn');

    let locked = false;

    lock.onclick = () => {

        locked = !locked;

        value.readOnly = locked;

        lock.textContent = locked ? '🔒' : '🔓';

        if(locked){
            value.style.background = '#ffe066';
            value.style.color = '#000';
        }
        else{
            value.style.background = '';
            value.style.color = '';
        }
    };

    copy.onclick = () => {

        navigator.clipboard.writeText(value.value);

        copy.textContent = '✓';

        setTimeout(() => {
            copy.textContent = '📋';
        }, 1000);
    };
}

document.querySelectorAll('.field').forEach(attachEvents);

</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
    getFirestore,
    doc,
    getDoc,
    updateDoc,
    collection,
    getDocs,
    setDoc,
    addDoc,
    onSnapshot
    
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuJlAKmegMxQTCHbpIFlUiKW5em1Z6l0w",
  authDomain: "edito-1910f.firebaseapp.com",
  projectId: "edito-1910f",
  storageBucket: "edito-1910f.firebasestorage.app",
  messagingSenderId: "310918134644",
  appId: "1:310918134644:web:a037498e2a46bf49904a21"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
async function unlockSite() {

    const entered =
        document.getElementById("sitePassword").value;

    const settingRef =
        doc(db, "setting", "config");

    const snap =
        await getDoc(settingRef);

    if (!snap.exists()) {

        alert("Settings not found");
        return;
    }

    const data = snap.data();

    if (entered === data.accessPassword) {

        document.getElementById("loginScreen")
            .style.display = "none";

        document.getElementById("mainContent")
            .style.display = "block";
        localStorage.setItem("editoLoggedIn", "true");

    } else {

        alert("Wrong Password");

    }
}

let currentDocId = "test";
function loadData() {

    const userRef =
        doc(db, "users", currentDocId);

    onSnapshot(userRef, (snap) => {

        if (!snap.exists()) return;

        const data = snap.data();

        document.getElementById("firstName").value =
            data.firstName || "";

        document.getElementById("lastName").value =
            data.lastName || "";

        document.getElementById("email").value =
            data.email || "";

        document.getElementById("aadhaar").value =
            data.aadhaar || "";

        document.getElementById("mobile").value =
            data.mobile || "";

    });

}
async function saveData() {
    const userRef =
        doc(db, "users", currentDocId);

    await updateDoc(userRef, {

        firstName:
            document.getElementById("firstName").value,

        lastName:
            document.getElementById("lastName").value,

        email:
            document.getElementById("email").value,

        aadhaar:
            document.getElementById("aadhaar").value,

        mobile:
            document.getElementById("mobile").value
    });
}
async function loadRecords() {

    const select =
        document.getElementById("recordList");

    select.innerHTML = "";

    const snapshot =
        await getDocs(collection(db, "users"));

    snapshot.forEach((docSnap) => {

        const data = docSnap.data();

        const option =
            document.createElement("option");

        option.value = docSnap.id;

        option.textContent = docSnap.id;

        select.appendChild(option);

    });
    document.getElementById("recordList")
.addEventListener("change", (e) => {

    currentDocId = e.target.value;

    loadData();

});
}

async function addUser() {

    const snapshot =
        await getDocs(collection(db, "users"));

    const newId =
        (1000 + snapshot.size + 1).toString();

    await setDoc(
        doc(db, "users", newId),
        {
            firstName: "",
            lastName: "",
            email: "",
            aadhaar: "",
            mobile: ""
        }
    );

    await loadRecords();

    currentDocId = newId;

    document.getElementById("recordList").value =
        newId;

    await loadData();
}
await loadRecords();
    currentDocId =
    document.getElementById("recordList").value;
await loadData();
document.getElementById("addUserBtn")
.addEventListener("click", addUser);
document.getElementById("unlockBtn")
.addEventListener("click", unlockSite);
document.querySelectorAll(".value")
.forEach(input => {
    input.addEventListener("change", saveData);
    document.getElementById("logoutBtn")
.addEventListener("click", () => {

    localStorage.removeItem(
        "editoLoggedIn"
    );

    location.reload();

});
});
</script>
<script>
if (
    localStorage.getItem("editoLoggedIn")
    === "true"
) {
    document.getElementById("loginScreen")
        .style.display = "none";
    document.getElementById("mainContent")
        .style.display = "block";
    
}
</script>

</body>
</html>
